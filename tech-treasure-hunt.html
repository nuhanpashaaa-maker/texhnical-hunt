<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Technical Treasure Hunt</title>
<style>
  body {
    font-family: Arial, Helvetica, sans-serif;
    background-color: #f0f2f5;
    display: flex;
    justify-content: center;
    padding: 30px 15px;
  }

  .container {
    background-color: #ffffff;
    max-width: 500px;
    width: 100%;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }

  h1 {
    text-align: center;
    color: #2c3e50;
  }

  #score-board {
    text-align: right;
    font-weight: bold;
    color: #2c3e50;
    margin-bottom: 10px;
  }

  .clue-box {
    background-color: #eef4ff;
    border: 2px solid #cddcf5;
    border-radius: 8px;
    padding: 15px;
    margin-bottom: 15px;
  }

  .category {
    font-size: 14px;
    color: #4a6fa5;
    font-weight: bold;
    margin-bottom: 10px;
  }

  .riddle-text {
    font-size: 16px;
    color: #333;
    white-space: pre-line;
    margin-bottom: 15px;
  }

  input[type="text"] {
    width: 100%;
    padding: 10px;
    font-size: 15px;
    border: 1px solid #ccc;
    border-radius: 5px;
    margin-bottom: 10px;
  }

  button {
    padding: 10px 18px;
    font-size: 15px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    margin-right: 8px;
    margin-bottom: 8px;
  }

  #submit-btn {
    background-color: #4a6fa5;
    color: white;
  }

  #hint-btn {
    background-color: #e0e0e0;
    color: #333;
  }

  #next-btn {
    background-color: #2e7d32;
    color: white;
  }

  #message {
    font-weight: bold;
    margin-bottom: 10px;
  }

  .correct-msg { color: green; }
  .wrong-msg { color: red; }

  #hint-text {
    font-style: italic;
    color: #7a5c00;
    background-color: #fff8e1;
    padding: 8px;
    border-radius: 5px;
    margin-bottom: 10px;
  }

  #result-screen {
    text-align: center;
  }

  .hidden {
    display: none;
  }
</style>
</head>
<body>

<div class="container">
  <h1>🔍 Technical Treasure Hunt</h1>
  <div id="score-board">Score: <span id="score">0</span></div>

  <!-- Game Screen -->
  <div id="game-screen">
    <div class="clue-box">
      <div class="category" id="category-label"></div>
      <p class="riddle-text" id="riddle-text"></p>

      <p id="hint-text" class="hidden"></p>
      <p id="message"></p>

      <input type="text" id="answer-box" placeholder="Type your answer here">
      <br>
      <button id="submit-btn" onclick="checkAnswer()">Submit</button>
      <button id="hint-btn" onclick="showHint()">Show Hint</button>
      <button id="next-btn" class="hidden" onclick="loadNextClue()">Next Clue</button>
    </div>
    <p>Clue <span id="clue-number">1</span> of <span id="total-clues"></span></p>
  </div>

  <!-- Result Screen -->
  <div id="result-screen" class="hidden">
    <h2>🎉 Hunt Completed!</h2>
    <p>Your final score is <strong id="final-score"></strong> out of <strong id="max-score"></strong>.</p>
    <button onclick="restartGame()">Play Again</button>
  </div>
</div>

<script>
  // Array of clue objects. Each clue has a category, a riddle, an answer, and a hint.
  var clues = [
    {
      category: "Data Structures",
      riddle: "I store elements in key-value pairs.\nLookup takes constant time on average.\nWhat data structure am I?",
      answer: "hashmap",
      hint: "Also called a hash table or dictionary."
    },
    {
      category: "Algorithms",
      riddle: "I repeatedly divide the array in half\nto search for a target value quickly.\nWhat search algorithm am I?",
      answer: "binary search",
      hint: "Only works on sorted arrays."
    },
    {
      category: "Object Oriented Programming",
      riddle: "I allow a child class to reuse\nthe properties and methods of a parent class.\nWhat OOP concept am I?",
      answer: "inheritance",
      hint: "Think of a 'Car' class extending a 'Vehicle' class."
    },
    {
      category: "Networking",
      riddle: "I resolve human-readable website names\ninto IP addresses that computers understand.\nWhat system am I?",
      answer: "dns",
      hint: "Stands for Domain Name System."
    },
    {
      category: "Databases",
      riddle: "I combine rows from two or more tables\nbased on a related column between them.\nWhat SQL operation am I?",
      answer: "join",
      hint: "INNER, LEFT, and RIGHT are common types of me."
    }
  ];

  var currentClueIndex = 0;
  var score = 0;
  var pointsPerClue = 10;
  var hintPenalty = 4;
  var hintUsedForCurrentClue = false;

  // Set total number of clues on page load
  document.getElementById("total-clues").textContent = clues.length;

  function loadClue() {
    var clue = clues[currentClueIndex];

    document.getElementById("category-label").textContent = clue.category;
    document.getElementById("riddle-text").textContent = clue.riddle;
    document.getElementById("clue-number").textContent = currentClueIndex + 1;

    // Reset UI elements for the new clue
    document.getElementById("answer-box").value = "";
    document.getElementById("message").textContent = "";
    document.getElementById("message").className = "";
    document.getElementById("hint-text").classList.add("hidden");
    document.getElementById("hint-text").textContent = "";
    document.getElementById("next-btn").classList.add("hidden");
    document.getElementById("submit-btn").classList.remove("hidden");
    document.getElementById("hint-btn").classList.remove("hidden");
    document.getElementById("answer-box").classList.remove("hidden");

    hintUsedForCurrentClue = false;
  }

  function checkAnswer() {
    var userAnswer = document.getElementById("answer-box").value;
    userAnswer = userAnswer.trim().toLowerCase();

    var correctAnswer = clues[currentClueIndex].answer.toLowerCase();
    var messageBox = document.getElementById("message");

    if (userAnswer === correctAnswer) {
      var pointsEarned = hintUsedForCurrentClue ? (pointsPerClue - hintPenalty) : pointsPerClue;
      score = score + pointsEarned;
      document.getElementById("score").textContent = score;

      messageBox.textContent = "Correct! +" + pointsEarned + " points";
      messageBox.className = "correct-msg";

      document.getElementById("submit-btn").classList.add("hidden");
      document.getElementById("hint-btn").classList.add("hidden");
      document.getElementById("answer-box").classList.add("hidden");
      document.getElementById("next-btn").classList.remove("hidden");
    } else {
      messageBox.textContent = "That's not correct. Try again!";
      messageBox.className = "wrong-msg";
    }
  }

  function showHint() {
    hintUsedForCurrentClue = true;
    var hintBox = document.getElementById("hint-text");
    hintBox.textContent = "Hint: " + clues[currentClueIndex].hint;
    hintBox.classList.remove("hidden");
  }

  function loadNextClue() {
    currentClueIndex = currentClueIndex + 1;

    if (currentClueIndex < clues.length) {
      loadClue();
    } else {
      showResultScreen();
    }
  }

  function showResultScreen() {
    document.getElementById("game-screen").classList.add("hidden");
    document.getElementById("result-screen").classList.remove("hidden");

    document.getElementById("final-score").textContent = score;
    document.getElementById("max-score").textContent = clues.length * pointsPerClue;
  }

  function restartGame() {
    currentClueIndex = 0;
    score = 0;
    document.getElementById("score").textContent = score;

    document.getElementById("result-screen").classList.add("hidden");
    document.getElementById("game-screen").classList.remove("hidden");

    loadClue();
  }

  // Load the first clue when the page opens
  loadClue();
</script>

</body>
</html>
